name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          targets="darwin/arm64 darwin/amd64 linux/amd64 linux/arm64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="dist/gcal-organizer-${os}-${arch}"
            echo "Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch go build -ldflags="-s -w" -o "$output" ./cmd/gcal-organizer
          done
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          targets="darwin/arm64 darwin/amd64 linux/amd64 linux/arm64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="dist/gcal-organizer-${os}-${arch}"
            echo "Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" -o "$output" ./cmd/gcal-organizer
          done
          ls -lh dist/

      - name: Package man page
        run: |
          gzip -c man/gcal-organizer.1 > dist/gcal-organizer.1.gz

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          # Download the tarball to compute SHA
          curl -sL "$TARBALL_URL" -o /tmp/source.tar.gz
          SHA256=$(sha256sum /tmp/source.tar.gz | cut -d' ' -f1)

          sed -e "s|v1.1.0|${GITHUB_REF_NAME}|g" \
              -e "s|PLACEHOLDER_SHA256|${SHA256}|g" \
              deploy/homebrew/gcal-organizer.rb > dist/gcal-organizer.rb

          echo "Generated formula for ${GITHUB_REF_NAME} (SHA: ${SHA256})"
          cat dist/gcal-organizer.rb

      - name: Publish formula to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Clone the tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jflowers/homebrew-gcal-organizer.git" /tmp/tap

          # Ensure Formula directory exists
          mkdir -p /tmp/tap/Formula

          # Copy the generated formula
          cp dist/gcal-organizer.rb /tmp/tap/Formula/gcal-organizer.rb

          # Commit and push
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gcal-organizer.rb
          git commit -m "Update gcal-organizer to ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*


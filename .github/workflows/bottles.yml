name: Build Bottles

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  bottle:
    # Only run if the Release workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            tag: arm64_sonoma
          - os: ubuntu-22.04
            arch: x86_64
            tag: x86_64_linux

    runs-on: ${{ matrix.os }}
    name: Bottle (${{ matrix.tag }})

    steps:
      - name: Get release tag
        id: tag
        run: |
          # Support both workflow_run (automatic) and workflow_dispatch (manual)
          TAG="${{ github.event.workflow_run.head_branch || github.event.inputs.tag }}"
          echo "Release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap formula
        run: brew tap jflowers/gcal-organizer

      - name: Install and build bottle
        run: |
          brew install --build-bottle jflowers/gcal-organizer/gcal-organizer
          brew bottle --json --no-rebuild jflowers/gcal-organizer/gcal-organizer

      - name: Upload bottle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Find the generated bottle tarball
          BOTTLE_FILE=$(ls gcal-organizer--*.tar.gz 2>/dev/null | head -1)
          if [ -z "$BOTTLE_FILE" ]; then
            echo "No bottle file found"
            ls -la
            exit 1
          fi

          echo "Uploading bottle: $BOTTLE_FILE to release $TAG"
          gh release upload "$TAG" "$BOTTLE_FILE" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Upload bottle JSON
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.tag }}
          path: "*.bottle.json"

  update-formula:
    needs: bottle
    runs-on: ubuntu-latest
    name: Update formula with bottles

    steps:
      - name: Get release tag
        id: tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch || github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all bottle JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-*
          merge-multiple: true

      - name: Update tap formula with bottles
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jflowers/homebrew-gcal-organizer.git" /tmp/tap

          python3 << 'PYEOF'
          import json, glob, re

          tag = "${{ steps.tag.outputs.tag }}"

          # Parse all bottle JSON files
          bottles = []
          for jf in sorted(glob.glob("*.json")):
              with open(jf) as f:
                  data = json.load(f)
              formula = list(data.keys())[0]
              for btag, info in data[formula]["bottle"]["tags"].items():
                  bottles.append((btag, info["sha256"]))
                  print(f"  Found: {btag} -> {info['sha256'][:12]}...")

          # Build bottle block
          lines = ["  bottle do"]
          lines.append(f'    root_url "https://github.com/jflowers/gcal-organizer/releases/download/{tag}"')
          for btag, sha in bottles:
              lines.append(f'    sha256 cellar: :any_skip_relocation, {btag}: "{sha}"')
          lines.append("  end")
          bottle_block = "\n".join(lines)
          print(f"\nBottle block:\n{bottle_block}")

          # Read formula
          formula_path = "/tmp/tap/Formula/gcal-organizer.rb"
          with open(formula_path) as f:
              content = f.read()

          # Remove existing bottle block if present
          content = re.sub(r'\n  bottle do\n.*?\n  end\n', '\n', content, flags=re.DOTALL)

          # Insert after license line
          content = content.replace(
              '  license "MIT"',
              f'  license "MIT"\n\n{bottle_block}'
          )

          with open(formula_path, "w") as f:
              f.write(content)
          print(f"\nUpdated formula written to {formula_path}")
          PYEOF

          echo "Final formula:"
          cat /tmp/tap/Formula/gcal-organizer.rb

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gcal-organizer.rb
          git commit -m "Add bottles for ${TAG}" || echo "No changes"
          git push

